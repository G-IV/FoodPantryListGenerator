name: CI and Release

# When this workflow runs
# -----------------------
# - Every push to any branch: runs the test suite on all platforms.
# - Every pull request targeting main: runs the test suite.
# - Every push of a version tag (e.g. v2.0.0): runs tests AND builds
#   the Windows .exe, then attaches it to a GitHub Release automatically.
#
# To release a new version:
#   git tag v2.1.0
#   git push origin v2.1.0
# GitHub Actions will do the rest. See docs/DeveloperReadme.md.

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # test — runs on every push and pull request, on all three platforms.
  # Running on Windows confirms the code works on the target OS. Running on
  # macOS and Linux catches platform-specific issues early for developers
  # who work on those machines.
  # ---------------------------------------------------------------------------
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # build — runs only when a version tag is pushed (e.g. v2.0.0).
  # Requires all tests to pass first (needs: test).
  # Produces a single FoodPantryListGenerator.exe and attaches it to a
  # GitHub Release that is created automatically.
  # ---------------------------------------------------------------------------
  build:
    name: Build Windows .exe and create release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build single-file executable
        # --onefile bundles everything (Python interpreter + code) into one .exe
        # --name sets the output filename to FoodPantryListGenerator.exe
        # The resulting file lands in dist/FoodPantryListGenerator.exe
        run: pyinstaller --onefile --name FoodPantryListGenerator FoodPantryListGenerator.py

      - name: Create GitHub Release and attach .exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FoodPantryListGenerator.exe
          # Automatically generates release notes from commits since the last tag
          generate_release_notes: true
