name: Test

# Runs on every push to any branch and every pull request targeting main.
# This is the check required by the branch protection rule on main.
#
# See docs/DeveloperReadme.md for full workflow documentation.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  # Aggregate job — this is the single check name required by the branch
  # protection ruleset. It passes only when all matrix jobs above pass.
  all-checks-pass:
    name: All checks pass
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all matrix jobs succeeded
        run: |
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "All tests passed."
          else
            echo "One or more test jobs failed or were cancelled."
            exit 1
          fi
