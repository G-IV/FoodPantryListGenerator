name: Release

# Runs only when a version tag is pushed (e.g. v2.1.0).
# Builds FoodPantryListGenerator.exe on Windows and attaches it to a
# GitHub Release automatically.
#
# To release a new version:
#   git tag v2.1.0
#   git push origin v2.1.0
#
# See docs/DeveloperReadme.md for full workflow documentation.

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build Windows .exe and create release
    permissions:
      contents: write
    needs: test
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build single-file executable
        # --onefile bundles everything (Python interpreter + code) into one .exe
        # --name sets the output filename to FoodPantryListGenerator.exe
        # The resulting file lands in dist/FoodPantryListGenerator.exe
        run: pyinstaller --onefile --name FoodPantryListGenerator FoodPantryListGenerator.py

      - name: Sign executable
        # Decodes the PFX from a base64 GitHub Secret, signs the EXE, then
        # deletes the PFX so it never persists in the runner's workspace.
        # Requires two repository secrets:
        #   CERT_PFX_BASE64  — base64-encoded ChurchCert.pfx
        #   CERT_PFX_PASSWORD — password set when the PFX was exported
        shell: powershell
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PFX_PASSWORD: ${{ secrets.CERT_PFX_PASSWORD }}
        run: |
          # Write the PFX to disk from the base64 secret
          $pfxPath = "ChurchCert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_PFX_BASE64))

          # Locate signtool.exe (included with the Windows SDK on GitHub runners)
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -like "*x64*" } |
                      Select-Object -First 1 -ExpandProperty FullName

          # Sign with a trusted timestamp so the signature survives cert expiry
          & $signtool sign /f $pfxPath /p $env:CERT_PFX_PASSWORD `
              /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
              "dist\FoodPantryListGenerator.exe"

          # Remove the PFX — never leave it on the runner
          Remove-Item $pfxPath

      - name: Create GitHub Release and attach .exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FoodPantryListGenerator.exe
          generate_release_notes: true
